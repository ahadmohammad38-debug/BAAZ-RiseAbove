<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAAZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

    body { background: #0a0a0a; color: white; overflow-x: hidden; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 60px; position: fixed; width: 100%; top: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 1000;
    }

    .logo {
  font-weight:700;
  font-size:30px;
  letter-spacing:4px;
}

    nav a { margin-left: 30px; text-decoration: none; color: white; font-weight: 500; transition: 0.3s; }
    nav a:hover { color: #888; }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    /* UPDATED: San Diego Zoo bald eagle page used as background source */
    /* UPDATED stable eagle background */
    /* eagle background stronger visibility */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('https://www.nps.gov/common/uploads/cropped_image/primary/7357F452-9461-A974-DF84E7F4C6A616BC.jpg?mode=crop&quality=90&width=1600') center/cover no-repeat;
  opacity:0.55;
  filter:grayscale(80%) brightness(70%) contrast(150%);
  transform:scale(1.08);
  z-index:1;
}
}

    /* layered eagle depth */
    /* eagle depth layer enhanced */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, rgba(0,0,0,0.25), rgba(0,0,0,0.92));
  z-index:2;
  pointer-even
}

    .urdu {
      position: absolute;
      font-size: 154px;
      font-weight: 700;
      color: rgba(255,255,255,0.28);
      z-index: 3;
      letter-spacing: 10px;
      top: 6%;
      left: 50%;
      transform: translate(-50%, 0);
      pointer-events: none;
    }

    .hero-content { position: relative; z-index: 4; }

    .hero h1 { font-size: 64px; letter-spacing: 6px; }
    .hero p { margin-top: 20px; font-size: 18px; color: #ccc; }

    .btn {
      margin-top: 30px;
      padding: 12px 30px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover { background: white; color: black; }

    .section { padding: 100px 60px; text-align: center; }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-top: 50px;
    }

    .product {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .product:hover { transform: translateY(-10px); }

    .product img { width: 100%; border-radius: 10px; }
    .product h3 { margin-top: 15px; }

    footer { padding: 40px; text-align: center; background: #000; color: #777; }
  .urdu-small{
  margin-left:10px;
  font-size:36px;
  color:rgba(255,255,255,0.7);
  font-weight:600;
}
</style>
</head>
<body>

<header>
  <div class="logo">BAAZ <span class="urdu-small">باز</span></div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="urdu">باز</div>
  <div class="hero-content">
    <h1>BAAZ</h1>
    <p>Rise Above</p>
    <button class="btn">Shop Now</button>
  </div>
</section>

<section class="section">
  <h2>Featured</h2>
  <div class="products">
    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
      <h3>Falcon Hoodie</h3>
      <p>$80</p>
    </div>
    <div class="product">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <h3>Minimal Tee</h3>
      <p>$40</p>
    </div>
    <div class="product">
      <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
      <h3>Black Edition</h3>
      <p>$60</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>About BAAZ</h2>
  <p>BAAZ represents vision, speed, and dominance. Inspired by the falcon, our designs are made for those who rise above.</p>
</section>

<footer>
  <p>© 2026 BAAZ. All rights reserved.</p>
</footer>

</body>
</html>
